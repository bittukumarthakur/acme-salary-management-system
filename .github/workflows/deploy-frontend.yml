name: Deploy Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target GitHub environment to deploy to"
        type: environment
        default: dev

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests with coverage
        run: yarn test:coverage

      - name: Coverage summary
        if: always()
        run: |
          {
            echo "## 🧪 Frontend Test Coverage"
            echo ""
            if [ -f coverage/coverage-summary.json ]; then
              echo "| Metric | Covered | Total | % |"
              echo "| --- | --- | --- | --- |"
              jq -r '.total | to_entries[]
                | select(.key != "linesCovered")
                | "| \(.key) | \(.value.covered) | \(.value.total) | \(.value.pct)% |"' \
                coverage/coverage-summary.json
            else
              echo "_No coverage summary found._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        env:
          ACME_BACKEND_API_BASE_URL: ${{ vars.ACME_BACKEND_API_BASE_URL || vars.VITE_API_BASE_URL }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: yarn build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: >-
            pages deploy dist
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}
            --branch=${{ github.ref_name }}

      - name: Deployment summary
        if: success()
        run: |
          {
            echo "## 🚀 Frontend Deployment — Cloudflare Pages"
            echo ""
            echo "**Project:** \`${{ vars.CLOUDFLARE_PAGES_PROJECT }}\`  •  **Branch:** \`${{ github.ref_name }}\`"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Deployment URL | ${{ steps.deploy.outputs.deployment-url }} |"
          } >> "$GITHUB_STEP_SUMMARY"

