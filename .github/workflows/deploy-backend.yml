name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target GitHub environment to deploy to"
        type: environment
        default: dev

permissions:
  contents: read
  deployments: write # For automatic GitHub deployment tracking

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests with coverage
        run: yarn test:ci

      - name: Coverage summary
        if: always()
        run: |
          {
            echo "## 🧪 Backend Test Coverage"
            echo ""
            if [ -f coverage/coverage-summary.json ]; then
              echo "| Metric | Covered | Total | % |"
              echo "| --- | --- | --- | --- |"
              jq -r '.total | to_entries[]
                | select(.key != "linesCovered")
                | "| \(.key) | \(.value.covered) | \(.value.total) | \(.value.pct)% |"' \
                coverage/coverage-summary.json
            else
              echo "_No coverage summary found._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Deploy to Prisma Compute (CLI)
        id: deploy
        env:
          PRISMA_API_TOKEN: ${{ secrets.PRISMA_API_TOKEN }}
          COMPUTE_SERVICE_ID: ${{ vars.COMPUTE_SERVICE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORT: ${{ vars.PORT }}
        run: |
          set -o pipefail
          npx --yes @prisma/compute-cli@0.31.0 deploy \
            --service "$COMPUTE_SERVICE_ID" \
            --skip-build \
            --path dist \
            --entrypoint src/main.js \
            --http-port "$PORT" \
            --env "PORT=$PORT" \
            --env "DATABASE_URL=$DATABASE_URL" \
            --env "NODE_ENV=dev" \
            --env "LOG_LEVEL=info" \
            --json | tee deploy-result.json

      - name: Print deployment result
        if: success()
        run: |
          echo "===== Deployment result ====="
          jq . deploy-result.json

          APP_NAME="$(jq -r '.data.appName // "unknown"' deploy-result.json)"

          {
            echo "## 🚀 Backend Deployment — ${APP_NAME}"
            echo ""
            echo "**Service:** \`backend\`  •  **App:** ${APP_NAME}"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            jq -r '.data | [
              "| App | \(.appName) |",
              "| Region | \(.region) |",
              "| Deployment ID | `\(.deploymentId)` |",
              "| Service URL | \(.appEndpointDomain) |",
              "| Version URL | \(.deploymentEndpointDomain) |",
              "| Promoted | \(.promoted) |",
              "| HTTP port | \(.resolvedConfig.portMapping.http) |",
              "| Previous deployment | `\(.previousDeploymentId // "—")` (\(.previousDeploymentAction // "none")) |"
            ] | .[]' deploy-result.json
          } >> "$GITHUB_STEP_SUMMARY"

